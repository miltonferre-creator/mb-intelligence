<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MB render</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <style>html,body{margin:0}#app{min-height:100vh}</style>
</head>
<body>
  <div id="app"></div>
  <script src="../assets/lucide.min.js"></script>
  <script src="../assets/ui.js"></script>
  <script src="./screens.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var name = params.get("screen") || "dashboard";
      var fn = window.SCREENS[name];
      document.getElementById("app").innerHTML = fn ? fn() : ("Unknown screen: " + name);
      try { if (window.lucide && lucide.createIcons) lucide.createIcons(); } catch (e) {}
      document.title = "MB render: " + name;
    })();
  </script>
</body>
</html>
